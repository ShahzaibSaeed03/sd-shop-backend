<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SD-SHOP-BACKEND</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 50px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      max-width: 500px;
      width: 90%;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 999px;
      background: #22c55e;
      color: #022c22;
      margin-bottom: 20px;
      font-weight: 600;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    h2 {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 25px;
      font-weight: 400;
    }

    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      background: #020617;
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #64748b;
    }

    .pulse {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.6); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    .title {
      color: #38bdf8;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="badge">PRODUCTION</div>

    <h1 class="title">SD-SHOP-BACKEND</h1>
    <h2>Backend API Server</h2>

    <div class="status">
      <span class="pulse"></span>
      Server is running successfully
    </div>

    <div class="footer">
      Powered by Codex Thrill • Deployed on VPS • Secured via Nginx Proxy
    </div>
  </div>
</body>
</html>
